<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>At Play — Weekly Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  .atplay-cal {
    --ap-color-1: #E8943A;
    --ap-color-2: #7BAED6;
    --ap-color-3: #E84B8A;
    --ap-color-4: #6BAE73;
    --ap-bg-1: #FDF3E7;
    --ap-bg-2: #EBF3FA;
    --ap-bg-3: #FDEAF2;
    --ap-bg-4: #EDF7EE;
    --ap-hour-h: 60px;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    color: #333 !important;
    line-height: 1.5 !important;
    -webkit-font-smoothing: antialiased !important;
  }

  .atplay-cal *, .atplay-cal *::before, .atplay-cal *::after {
    box-sizing: border-box !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* ---- Header ---- */
  .atplay-cal .ap-header {
    background: #fff !important;
    border-bottom: 1px solid #e0e0e0 !important;
    padding: 16px 24px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    flex-wrap: wrap !important;
    gap: 12px !important;
  }
  .atplay-cal .ap-header h1 {
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    font-size: 22px !important;
    font-weight: 700 !important;
    color: #222 !important;
    letter-spacing: -0.3px !important;
    text-transform: none !important;
    margin: 0 !important;
    padding: 0 !important;
    line-height: 1.3 !important;
    border: none !important;
  }
  .atplay-cal .ap-week-nav {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
  }
  .atplay-cal .ap-week-nav button {
    background: #fff !important;
    border: 1px solid #d0d0d0 !important;
    border-radius: 6px !important;
    padding: 6px 14px !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    color: #444 !important;
    cursor: pointer !important;
    transition: background 0.15s, border-color 0.15s !important;
    text-transform: none !important;
    letter-spacing: normal !important;
    line-height: 1.4 !important;
    text-decoration: none !important;
    display: inline-block !important;
    height: auto !important;
    text-align: center !important;
  }
  .atplay-cal .ap-week-nav button:hover {
    background: #f0f0f0 !important;
    border-color: #bbb !important;
  }
  .atplay-cal .ap-week-nav button.ap-today-btn {
    color: var(--ap-color-3) !important;
    border-color: var(--ap-color-3) !important;
  }
  .atplay-cal .ap-week-nav button.ap-today-btn:hover {
    background: var(--ap-bg-3) !important;
  }
  .atplay-cal .ap-week-label {
    font-size: 15px !important;
    font-weight: 600 !important;
    color: #555 !important;
    min-width: 200px !important;
    text-align: center !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    text-transform: none !important;
  }

  /* ---- Status / loading ---- */
  .atplay-cal .ap-status-banner {
    text-align: center !important;
    color: #888 !important;
    font-size: 14px !important;
    line-height: 1.6 !important;
  }
  .atplay-cal .ap-setup-msg {
    padding: 20px 24px !important;
    background: #FFF8E1 !important;
    border-bottom: 1px solid #F0E0B0 !important;
    color: #8D6E00 !important;
    font-size: 13px !important;
    text-align: center !important;
  }
  .atplay-cal .ap-loading-msg {
    padding: 16px !important;
    text-align: center !important;
    color: #aaa !important;
    font-size: 14px !important;
  }

  /* ---- Timetable grid (desktop) ---- */
  .atplay-cal .ap-timetable {
    display: grid !important;
    grid-template-columns: 52px repeat(7, 1fr) !important;
    gap: 0 !important;
    background: #e8e8e8 !important;
    margin: 0 !important;
    overflow-x: auto !important;
  }

  /* Time gutter column */
  .atplay-cal .ap-time-col {
    background: #fff !important;
    display: flex !important;
    flex-direction: column !important;
    border-right: 1px solid #e0e0e0 !important;
  }
  .atplay-cal .ap-gutter-corner {
    border-bottom: 1px solid #e0e0e0 !important;
    min-height: 46px !important;
  }
  .atplay-cal .ap-time-gutter {
    position: relative !important;
  }
  .atplay-cal .ap-time-label {
    position: absolute !important;
    right: 6px !important;
    font-size: 10px !important;
    font-weight: 600 !important;
    color: #aaa !important;
    line-height: 1 !important;
    transform: translateY(-50%) !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    white-space: nowrap !important;
    text-transform: none !important;
    letter-spacing: normal !important;
  }

  /* Day columns */
  .atplay-cal .ap-day-col {
    background: #fff !important;
    display: flex !important;
    flex-direction: column !important;
    min-width: 0 !important;
    border-left: 1px solid #e8e8e8 !important;
  }
  .atplay-cal .ap-day-hdr {
    padding: 8px 4px 6px !important;
    border-bottom: 1px solid #e0e0e0 !important;
    text-align: center !important;
    background: #fff !important;
    min-height: 46px !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
  }
  .atplay-cal .ap-day-name {
    font-size: 10px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.8px !important;
    color: #999 !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    line-height: 1 !important;
  }
  .atplay-cal .ap-day-num {
    font-size: 18px !important;
    font-weight: 700 !important;
    color: #333 !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    line-height: 1.2 !important;
    margin-top: 2px !important;
  }
  .atplay-cal .ap-day-col.is-today .ap-day-num {
    background: var(--ap-color-3) !important;
    color: #fff !important;
    width: 28px !important;
    height: 28px !important;
    border-radius: 50% !important;
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    font-size: 14px !important;
  }

  /* Day body with hour grid lines */
  .atplay-cal .ap-day-body {
    position: relative !important;
    background-color: #fff !important;
    background-image: repeating-linear-gradient(
      to bottom,
      #eee 0px, #eee 1px,
      transparent 1px, transparent var(--ap-hour-h)
    ) !important;
    background-size: 100% var(--ap-hour-h) !important;
    overflow: visible !important;
  }

  /* Event cards (absolutely positioned on desktop) */
  .atplay-cal .ap-card {
    position: absolute !important;
    left: 3px !important;
    right: 3px !important;
    z-index: 2 !important;
    border-radius: 5px !important;
    padding: 0 !important;
    cursor: pointer !important;
    transition: transform 0.12s, box-shadow 0.12s !important;
    border: none !important;
    text-decoration: none !important;
    text-align: left !important;
    overflow: hidden !important;
  }
  .atplay-cal .ap-card:hover {
    transform: scale(1.02) !important;
    box-shadow: 0 3px 12px rgba(0,0,0,0.18) !important;
    z-index: 3 !important;
  }
  .atplay-cal .ap-startline {
    height: 4px !important;
    margin: 0 !important;
  }
  .atplay-cal .ap-card-inner {
    padding: 4px 6px 6px !important;
    display: flex !important;
    align-items: flex-start !important;
    gap: 5px !important;
  }
  .atplay-cal .ap-icon {
    flex-shrink: 0 !important;
    width: 22px !important;
    height: 22px !important;
  }
  .atplay-cal .ap-icon svg {
    width: 22px !important;
    height: 22px !important;
    display: block !important;
  }
  .atplay-cal .ap-info {
    flex: 1 !important;
    min-width: 0 !important;
  }
  .atplay-cal .ap-ev-name {
    font-size: 11px !important;
    font-weight: 700 !important;
    line-height: 1.2 !important;
    color: #333 !important;
    overflow: hidden !important;
    text-overflow: ellipsis !important;
    white-space: nowrap !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    text-transform: none !important;
    text-decoration: none !important;
  }
  .atplay-cal .ap-ev-time {
    font-size: 10px !important;
    color: #777 !important;
    margin-top: 1px !important;
    font-weight: 400 !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    text-transform: none !important;
    line-height: 1.2 !important;
  }

  /* ---- Modal ---- */
  .atplay-cal .ap-overlay {
    position: fixed !important;
    inset: 0 !important;
    background: rgba(0,0,0,0.45) !important;
    z-index: 99999 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    opacity: 0 !important;
    pointer-events: none !important;
    transition: opacity 0.2s !important;
  }
  .atplay-cal .ap-overlay.active {
    opacity: 1 !important;
    pointer-events: auto !important;
  }
  .atplay-cal .ap-modal {
    background: #fff !important;
    border-radius: 12px !important;
    width: 90% !important;
    max-width: 440px !important;
    max-height: 85vh !important;
    overflow-y: auto !important;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3) !important;
    transform: translateY(20px) !important;
    transition: transform 0.25s !important;
  }
  .atplay-cal .ap-overlay.active .ap-modal {
    transform: translateY(0) !important;
  }
  .atplay-cal .ap-modal-bar {
    height: 6px !important;
    border-radius: 12px 12px 0 0 !important;
  }
  .atplay-cal .ap-modal-body {
    padding: 24px !important;
  }
  .atplay-cal .ap-modal-hdr {
    display: flex !important;
    align-items: flex-start !important;
    gap: 14px !important;
    margin-bottom: 20px !important;
  }
  .atplay-cal .ap-modal-icon {
    flex-shrink: 0 !important;
    width: 44px !important;
    height: 44px !important;
  }
  .atplay-cal .ap-modal-icon svg {
    width: 44px !important;
    height: 44px !important;
    display: block !important;
  }
  .atplay-cal .ap-modal-title {
    font-size: 20px !important;
    font-weight: 700 !important;
    color: #222 !important;
    line-height: 1.3 !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    text-transform: none !important;
    letter-spacing: normal !important;
    margin: 0 !important;
    border: none !important;
  }
  .atplay-cal .ap-detail {
    display: flex !important;
    align-items: flex-start !important;
    gap: 12px !important;
    padding: 10px 0 !important;
    border-top: 1px solid #f0f0f0 !important;
    font-size: 14px !important;
    color: #555 !important;
  }
  .atplay-cal .ap-detail-lbl {
    font-weight: 600 !important;
    color: #888 !important;
    min-width: 80px !important;
    font-size: 12px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.5px !important;
    padding-top: 2px !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
  }
  .atplay-cal .ap-detail-val {
    line-height: 1.5 !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    color: #555 !important;
    font-size: 14px !important;
  }
  .atplay-cal .ap-detail-val a {
    color: var(--ap-color-2) !important;
    text-decoration: none !important;
  }
  .atplay-cal .ap-detail-val a:hover { text-decoration: underline !important; }
  .atplay-cal .ap-modal-close {
    display: block !important;
    width: 100% !important;
    margin-top: 20px !important;
    padding: 10px !important;
    background: #f5f5f5 !important;
    border: none !important;
    border-radius: 8px !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    font-size: 14px !important;
    font-weight: 600 !important;
    color: #666 !important;
    cursor: pointer !important;
    text-transform: none !important;
    letter-spacing: normal !important;
    text-decoration: none !important;
    line-height: 1.4 !important;
    text-align: center !important;
  }
  .atplay-cal .ap-modal-close:hover { background: #eee !important; }

  /* ---- Legend ---- */
  .atplay-cal .ap-legend {
    padding: 10px 24px !important;
    background: #fff !important;
    border-top: 1px solid #e0e0e0 !important;
    display: flex !important;
    flex-wrap: wrap !important;
    gap: 16px !important;
    align-items: center !important;
    font-size: 12px !important;
    color: #777 !important;
  }
  .atplay-cal .ap-legend-item {
    display: flex !important;
    align-items: center !important;
    gap: 6px !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    font-size: 12px !important;
    color: #777 !important;
  }
  .atplay-cal .ap-legend-dot {
    width: 10px !important;
    height: 10px !important;
    border-radius: 50% !important;
    flex-shrink: 0 !important;
  }

  /* ---- Mobile: stack days, no time grid ---- */
  @media (max-width: 768px) {
    .atplay-cal .ap-header {
      padding: 12px 16px !important;
      justify-content: center !important;
      text-align: center !important;
    }
    .atplay-cal .ap-header h1 { width: 100% !important; }
    .atplay-cal .ap-week-label { min-width: auto !important; font-size: 14px !important; }
    .atplay-cal .ap-week-nav button { padding: 6px 10px !important; font-size: 12px !important; }

    .atplay-cal .ap-timetable {
      display: block !important;
      background: transparent !important;
    }
    .atplay-cal .ap-time-col { display: none !important; }
    .atplay-cal .ap-day-col {
      display: block !important;
      border-bottom: 1px solid #e0e0e0 !important;
      border-left: none !important;
    }
    .atplay-cal .ap-day-col.mobile-hidden { display: none !important; }
    .atplay-cal .ap-day-hdr {
      text-align: left !important;
      padding: 14px 16px 8px !important;
      display: flex !important;
      flex-direction: row !important;
      align-items: baseline !important;
      gap: 8px !important;
      border-bottom: none !important;
      min-height: auto !important;
    }
    .atplay-cal .ap-day-name { font-size: 13px !important; }
    .atplay-cal .ap-day-num { font-size: 16px !important; margin-top: 0 !important; }
    .atplay-cal .ap-day-body {
      height: auto !important;
      position: static !important;
      background-image: none !important;
      background-color: #fff !important;
      padding: 4px 12px 14px !important;
      display: flex !important;
      flex-direction: column !important;
      gap: 6px !important;
    }
    .atplay-cal .ap-card {
      position: static !important;
      left: auto !important;
      right: auto !important;
    }
    .atplay-cal .ap-card-inner { padding: 8px 10px !important; gap: 8px !important; }
    .atplay-cal .ap-icon { width: 32px !important; height: 32px !important; }
    .atplay-cal .ap-icon svg { width: 32px !important; height: 32px !important; }
    .atplay-cal .ap-ev-name { font-size: 14px !important; white-space: normal !important; }
    .atplay-cal .ap-ev-time { font-size: 12px !important; }
    .atplay-cal .ap-startline { height: 4px !important; }

    .atplay-cal .ap-modal {
      width: 100% !important;
      max-width: 100% !important;
      max-height: 100vh !important;
      border-radius: 0 !important;
      min-height: 100vh !important;
    }
    .atplay-cal .ap-modal-body { padding: 20px 16px !important; }
    .atplay-cal .ap-legend { padding: 10px 16px !important; justify-content: center !important; }
  }
</style>
</head>

      <button onclick="navigateWeek(-1)" aria-label="Previous week">&larr; Prev</button>

      <button onclick="navigateWeek(1)" aria-label="Next week">Next &rarr;</button>
    </div>
    <div class="ap-week-label" id="weekLabel"></div>
  </div>

  <div id="statusBanner" class="ap-status-banner"></div>
  <div id="calendarRoot"></div>
  <div id="legend" class="ap-legend"></div>

  <div class="ap-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="ap-modal" id="modalContent" onclick="event.stopPropagation()"></div>
  </div>

</div>

    camera: '<svg viewBox="0 0 40 40" fill="none"><path d="M4 14a3 3 0 013-3h5l2-3h12l2 3h5a3 3 0 013 3v16a3 3 0 01-3 3H7a3 3 0 01-3-3V14z" fill="'+c+'" opacity="0.2"/><circle cx="20" cy="21" r="7" stroke="'+c+'" stroke-width="2.5" fill="none"/><circle cx="20" cy="21" r="4" fill="'+c+'" opacity="0.4"/></svg>',
    build: '<svg viewBox="0 0 40 40" fill="none"><rect x="6" y="22" width="10" height="10" rx="1" fill="'+c+'" opacity="0.5"/><rect x="15" y="14" width="10" height="18" rx="1" fill="'+c+'" opacity="0.35"/><rect x="24" y="8" width="10" height="24" rx="1" fill="'+c+'" opacity="0.5"/></svg>',
    default: '<svg viewBox="0 0 40 40" fill="none"><path d="M20 4l4.5 9.2 10.1 1.5-7.3 7.1 1.7 10.1L20 27l-9 4.8 1.7-10.1-7.3-7.1 10.1-1.5L20 4z" fill="'+c+'"/></svg>',
  };
  return icons[type] || icons.default;
}

function getIconType(name) {
  var lower = name.toLowerCase();
  for (var i = 0; i < ICON_MAP.length; i++) {
    for (var j = 0; j < ICON_MAP[i].keywords.length; j++) {
      if (lower.indexOf(ICON_MAP[i].keywords[j]) !== -1) return ICON_MAP[i].icon;
    }
  }
  return 'default';
}

var colorAssignments = {};
var nextColorIndex = 0;
var currentEvents = [];

function getColorForClass(name) {
  var key = name.trim().toLowerCase();
  if (colorAssignments[key] !== undefined) return colorAssignments[key];
  var max = PALETTE.length - 1;
  colorAssignments[key] = nextColorIndex % max;
  nextColorIndex++;
  if (nextColorIndex > max * 2 && Object.keys(colorAssignments).length > max) {
    var keys = Object.keys(colorAssignments);
    if (colorAssignments[keys[keys.length - 1]] < max) colorAssignments[keys[keys.length - 1]] = 3;
  }
  return colorAssignments[key];
}

var currentWeekStart = getWeekStart(new Date());

function getWeekStart(d) { var r = new Date(d); r.setDate(r.getDate() - r.getDay()); r.setHours(0,0,0,0); return r; }
function addDays(d, n) { var r = new Date(d); r.setDate(r.getDate() + n); return r; }
function formatDate(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function formatDateFull(d) { return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }); }
function formatTime(s) { return new Date(s).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }); }
function formatTimeRange(a, b) { return formatTime(a) + ' – ' + formatTime(b); }
function isSameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function isToday(d) { return isSameDay(d, new Date()); }

function updateWeekLabel() {
  var end = addDays(currentWeekStart, 6);
  document.getElementById('weekLabel').textContent = formatDate(currentWeekStart) + ' – ' + formatDate(end) + ', ' + end.getFullYear();
}
function navigateWeek(dir) { currentWeekStart = addDays(currentWeekStart, dir * 7); loadCalendar(); }
function navigateToday() { currentWeekStart = getWeekStart(new Date()); loadCalendar(); }

/* ---- iCal parsing ---- */
function parseICalDate(s) {
  if (!s) return null;
  s = s.replace(/^.*:/, '');
  if (s.indexOf('T') !== -1) {
    var iso = s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8)+'T'+s.slice(9,11)+':'+s.slice(11,13)+':'+s.slice(13,15);
    return new Date(s.charAt(s.length-1)==='Z' ? iso+'Z' : iso);
  }
  return new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8)+'T00:00:00');
}

function parseICal(text) {
  var lines = [], raw = text.split(/\r?\n/);
  for (var i = 0; i < raw.length; i++) {
    if ((raw[i].charAt(0)===' '||raw[i].charAt(0)==='\t') && lines.length) lines[lines.length-1] += raw[i].slice(1);
    else lines.push(raw[i]);
  }
  var events = [], inEv = false, ev = {};
  for (var j = 0; j < lines.length; j++) {
    var ln = lines[j];
    if (ln==='BEGIN:VEVENT') { inEv=true; ev={}; continue; }
    if (ln==='END:VEVENT') { inEv=false; if (ev.dtstart) events.push(ev); continue; }
    if (!inEv) continue;
    var ci = ln.indexOf(':'); if (ci<0) continue;
    var key = ln.slice(0,ci).split(';')[0].toUpperCase(), val = ln.slice(ci+1);
    if (key==='SUMMARY') ev.summary = val.replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\\\/g,'\\');
    else if (key==='DTSTART') ev.dtstart = parseICalDate(val);
    else if (key==='DTEND') ev.dtend = parseICalDate(val);
    else if (key==='DESCRIPTION') ev.description = val.replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\\\/g,'\\');
    else if (key==='LOCATION') ev.location = val.replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\\\/g,'\\');
  }
  return events;
}

function normalizeEvents(ical, ws, we) {
  return ical.filter(function(e) {
    if (!e.dtstart) return false;
    var allDay = e.dtstart.getHours()===0 && e.dtstart.getMinutes()===0 && e.dtend && e.dtend.getHours()===0 && e.dtend.getMinutes()===0 && (e.dtend-e.dtstart)>=86400000;
    return !allDay && e.dtstart >= ws && e.dtstart < we;
  }).sort(function(a,b){return a.dtstart-b.dtstart;}).map(function(e){
    return { summary: e.summary||'Untitled', start:{dateTime:e.dtstart.toISOString()}, end:{dateTime:(e.dtend||new Date(e.dtstart.getTime()+3600000)).toISOString()}, description:e.description||'', location:e.location||'', htmlLink:'' };
  });
}

/* ---- Fetch strategies ---- */
async function fetchViaICal() {
  var errors = [];
  for (var i = 0; i < CORS_PROXIES.length; i++) {
    try {
      var res = await fetch(CORS_PROXIES[i](ICAL_URL));
      if (!res.ok) throw new Error('HTTP ' + res.status);
      var text = await res.text();
      if (text.indexOf('BEGIN:VCALENDAR') === -1) throw new Error('Not iCal');
      return normalizeEvents(parseICal(text), currentWeekStart, addDays(currentWeekStart, 7));
    } catch (e) { errors.push('Proxy '+(i+1)+': '+e.message); }
  }
  throw new Error(errors.join(' | '));
}

async function fetchViaGoogleEmbed() {
  var calId = encodeURIComponent(CONFIG.CALENDAR_ID);
  var url = 'https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events?key=AIzaSyBNlYH01_9Hc5S1J9vuFmu2nUqBZJNAXxs&timeMin='+currentWeekStart.toISOString()+'&timeMax='+addDays(currentWeekStart,7).toISOString()+'&singleEvents=true&orderBy=startTime&timeZone='+CONFIG.TIMEZONE+'&maxResults=250';
  var res = await fetch(url);
  if (!res.ok) throw new Error('Embed API '+res.status);
  var data = await res.json();
  return (data.items||[]).filter(function(e){return e.start&&e.start.dateTime;});
}

async function fetchViaAPI() {
  if (!CONFIG.API_KEY) throw new Error('No API key');
  var calId = encodeURIComponent(CONFIG.CALENDAR_ID);
  var url = 'https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events?key='+CONFIG.API_KEY+'&timeMin='+currentWeekStart.toISOString()+'&timeMax='+addDays(currentWeekStart,7).toISOString()+'&singleEvents=true&orderBy=startTime&timeZone='+CONFIG.TIMEZONE+'&maxResults=250';
  var res = await fetch(url);
  if (!res.ok) throw new Error('API '+res.status);
  var data = await res.json();
  return (data.items||[]).filter(function(e){return e.start&&e.start.dateTime;});
}

async function fetchEvents() {
  var errors = [];
  if (CONFIG.API_KEY) { try { return await fetchViaAPI(); } catch(e) { errors.push('API: '+e.message); } }
  try { return await fetchViaICal(); } catch(e) { errors.push('iCal: '+e.message); }
  try { return await fetchViaGoogleEmbed(); } catch(e) { errors.push('Embed: '+e.message); }
  throw new Error(errors.join(' | '));
}

/* ---- Rendering ---- */
function groupByDay(events) {
  var days = [];
  for (var i = 0; i < 7; i++) days.push({ date: addDays(currentWeekStart, i), events: [] });
  for (var j = 0; j < events.length; j++) {
    var d = new Date(events[j].start.dateTime);
    for (var k = 0; k < days.length; k++) { if (isSameDay(d, days[k].date)) { days[k].events.push(events[j]); break; } }
  }
  return days;
}

function hourLabel(h) {
  if (h === 0) return '12 AM';
  if (h < 12) return h + ' AM';
  if (h === 12) return '12 PM';
  return (h - 12) + ' PM';
}

function renderCalendar(events) {
  currentEvents = events;
  var root = document.getElementById('calendarRoot');
  var days = groupByDay(events);
  var isMobile = window.innerWidth <= CONFIG.MOBILE_BREAKPOINT;
  var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var H = CONFIG.HOUR_HEIGHT;
  var totalH = (CONFIG.END_HOUR - CONFIG.START_HOUR) * H;

  var html = '<div class="ap-timetable">';

  // Time gutter column
  html += '<div class="ap-time-col">';
  html += '<div class="ap-gutter-corner"></div>';
  html += '<div class="ap-time-gutter" style="height:'+totalH+'px">';
  for (var h = CONFIG.START_HOUR; h <= CONFIG.END_HOUR; h++) {
    var top = (h - CONFIG.START_HOUR) * H;
    html += '<div class="ap-time-label" style="top:'+top+'px">'+hourLabel(h)+'</div>';
  }
  html += '</div></div>';

  // Day columns
  for (var i = 0; i < days.length; i++) {
    var day = days[i];
    var today = isToday(day.date);
    var hasEvents = day.events.length > 0;
    var cls = 'ap-day-col' + (today ? ' is-today' : '') + (isMobile && !hasEvents ? ' mobile-hidden' : '');

    html += '<div class="'+cls+'">';
    html += '<div class="ap-day-hdr">';
    html += '<div class="ap-day-name">'+dayNames[day.date.getDay()]+'</div>';
    html += '<div class="ap-day-num">'+day.date.getDate()+'</div>';
    html += '</div>';
    html += '<div class="ap-day-body" style="height:'+totalH+'px">';

    for (var j = 0; j < day.events.length; j++) {
      var ev = day.events[j];
      var gi = events.indexOf(ev);
      var ci = getColorForClass(ev.summary || 'Event');
      var pal = PALETTE[ci];
      var iconType = getIconType(ev.summary || '');
      var icon = getSvgIcon(iconType, pal.color);

      var st = new Date(ev.start.dateTime);
      var hrs = st.getHours() + st.getMinutes() / 60;
      var topPx = Math.max(0, Math.min(totalH - 40, (hrs - CONFIG.START_HOUR) * H));

      html += '<div class="ap-card" data-idx="'+gi+'" style="top:'+topPx+'px;background:'+pal.bg+'">';
      html += '<div class="ap-startline" style="background:'+pal.color+'"></div>';
      html += '<div class="ap-card-inner">';
      html += '<div class="ap-icon">'+icon+'</div>';
      html += '<div class="ap-info">';
      html += '<div class="ap-ev-name">'+escapeHtml(ev.summary||'Untitled')+'</div>';
      html += '<div class="ap-ev-time">'+formatTimeRange(ev.start.dateTime, ev.end.dateTime)+'</div>';
      html += '</div></div></div>';
    }

    html += '</div></div>';
  }

  html += '</div>';
  root.innerHTML = html;
  renderLegend();
}

function renderLegend() {
  var legend = document.getElementById('legend');
  var entries = Object.entries(colorAssignments).sort(function(a,b){return a[1]-b[1];});
  if (!entries.length) { legend.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < entries.length; i++) {
    var pal = PALETTE[entries[i][1]];
    var display = entries[i][0].split(' ').map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(' ');
    html += '<div class="ap-legend-item"><span class="ap-legend-dot" style="background:'+pal.color+'"></span>'+display+'</div>';
  }
  legend.innerHTML = html;
}

/* ---- Modal ---- */
function showModal(idx) {
  var ev = currentEvents[idx]; if (!ev) return;
  var ci = getColorForClass(ev.summary||'Event');
  var pal = PALETTE[ci];
  var icon = getSvgIcon(getIconType(ev.summary||''), pal.color);
  var sd = new Date(ev.start.dateTime);

  var h = '<div class="ap-modal-bar" style="background:'+pal.color+'"></div><div class="ap-modal-body">';
  h += '<div class="ap-modal-hdr"><div class="ap-modal-icon">'+icon+'</div>';
  h += '<div class="ap-modal-title">'+escapeHtml(ev.summary||'Untitled')+'</div></div>';
  h += '<div class="ap-detail"><span class="ap-detail-lbl">Date</span><span class="ap-detail-val">'+formatDateFull(sd)+'</span></div>';
  h += '<div class="ap-detail"><span class="ap-detail-lbl">Time</span><span class="ap-detail-val">'+formatTimeRange(ev.start.dateTime,ev.end.dateTime)+'</span></div>';
  if (ev.location) h += '<div class="ap-detail"><span class="ap-detail-lbl">Location</span><span class="ap-detail-val">'+escapeHtml(ev.location)+'</span></div>';
  if (ev.description) h += '<div class="ap-detail"><span class="ap-detail-lbl">Details</span><span class="ap-detail-val">'+sanitizeDescription(ev.description)+'</span></div>';
  if (ev.htmlLink) h += '<div class="ap-detail"><span class="ap-detail-lbl">Link</span><span class="ap-detail-val"><a href="'+escapeHtml(ev.htmlLink)+'" target="_blank" rel="noopener">View in Google Calendar</a></span></div>';
  h += '<button class="ap-modal-close" onclick="closeModal()">Close</button></div>';

  document.getElementById('modalContent').innerHTML = h;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', function(e) { if (e.key==='Escape') closeModal(); });

document.getElementById('calendarRoot').addEventListener('click', function(e) {
  var card = e.target.closest('.ap-card');
  if (card) { var idx = parseInt(card.dataset.idx, 10); if (!isNaN(idx)) showModal(idx); }
});

function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function sanitizeDescription(h) { var t = document.createElement('div'); t.innerHTML = h; var b = t.querySelectorAll('script,style,iframe,object,embed'); for (var i=0;i<b.length;i++) b[i].remove(); return t.innerHTML; }

async function loadCalendar() {
  updateWeekLabel();
  var banner = document.getElementById('statusBanner');
  banner.innerHTML = '<div class="ap-loading-msg">Loading schedule…</div>';
  renderCalendar([]);
  try {
    var events = await fetchEvents();
    banner.innerHTML = '';
    renderCalendar(events);
  } catch (err) {
    banner.innerHTML = '<div class="ap-setup-msg">'
      + 'Could not load calendar data. The calendar owner needs to enable '
      + '"Make available to public" in the calendar\'s Access permissions, '
      + 'or you can set a Google Calendar API key in <code>CONFIG.API_KEY</code>.'
      + '<br><small style="color:#aaa !important;margin-top:8px !important;display:block !important">'
      + escapeHtml(err.message) + '</small></div>';
  }
}

var resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function() { renderCalendar(currentEvents); }, 200);
});

loadCalendar();
</script>
