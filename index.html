<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>At Play — Weekly Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body { background: #f0f0f0 !important; padding-top: 24px !important; }
  .ap-page-wrap { background: #fff !important; }
  .atplay-cal {

    --ap-color-2: #7BAED6;
    --ap-color-3: #E84B8A;
    --ap-color-4: #6BAE73;
    --ap-hour-h: 60px;
    width: 100% !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    color: #333 !important;
    line-height: 1.5 !important;
    -webkit-font-smoothing: antialiased !important;
    position: relative !important;
  }
  .atplay-cal *, .atplay-cal *::before, .atplay-cal *::after {
    box-sizing: border-box !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  /* ---- Header ---- */
  .atplay-cal .ap-header {
    background: #fff !important;
    border-bottom: 1px solid #e0e0e0 !important;
    padding: 12px 16px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: flex-start !important;
    flex-wrap: wrap !important;
    gap: 12px !important;
  }
  .atplay-cal .ap-week-nav {
    display: flex !important;
    align-items: center !important;
    gap: 8px !important;
  }
  .atplay-cal .ap-week-nav button {
    background: #fff !important;
    border: 1px solid #d0d0d0 !important;
    border-radius: 6px !important;
    padding: 6px 14px !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    color: #444 !important;
    cursor: pointer !important;
    transition: background 0.15s, border-color 0.15s !important;
    text-transform: none !important;
    letter-spacing: normal !important;
    line-height: 1.4 !important;
    text-decoration: none !important;
    display: inline-block !important;
    height: auto !important;
    text-align: center !important;
  }
  .atplay-cal .ap-week-nav button:hover {
    background: #f0f0f0 !important;
    border-color: #bbb !important;
  }
  .atplay-cal .ap-week-nav button.ap-today-btn {
  }
  .atplay-cal .ap-week-label {
    font-size: 14px !important;
    font-weight: 600 !important;
    color: #555 !important;
    text-align: right !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    text-transform: none !important;
    margin-left: auto !important;
  }

  /* ---- Loading spinner ---- */
  @keyframes ap-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .atplay-cal .ap-loading-overlay {
    position: absolute !important;
    inset: 0 !important;
    z-index: 99998 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    background: transparent !important;
    pointer-events: none !important;
  }
  .atplay-cal .ap-loading-wrap {
    width: 120px !important;
    height: 120px !important;
    background: #fff !important;
    border-radius: 50% !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    border: none !important;
  }
  .atplay-cal .ap-loading-wrap img {
    width: 94px !important;
    height: 94px !important;
    animation: ap-spin 1.8s linear infinite !important;
  }
  .atplay-cal .ap-setup-msg {
    padding: 20px 24px !important;
    background: #FFF8E1 !important;
    border-bottom: 1px solid #F0E0B0 !important;
    color: #8D6E00 !important;
    font-size: 13px !important;
    text-align: center !important;
  }

  /* ---- Timetable grid ---- */
  .atplay-cal .ap-timetable {
    display: grid !important;
    grid-template-columns: 52px repeat(7, 1fr) !important;
    gap: 0 !important;
    background: #e8e8e8 !important;
    margin: 0 !important;
    overflow-x: auto !important;
    position: relative !important;
  }
  .atplay-cal .ap-timetable::after {
    content: '' !important;
    position: absolute !important;
    bottom: 0 !important;
    left: 0 !important;
    right: 0 !important;
    height: 1px !important;
    background: #fff !important;
    z-index: 5 !important;
    pointer-events: none !important;
  }

  /* Time gutter */
  .atplay-cal .ap-time-col {
    background: #fff !important;
    display: flex !important;
    flex-direction: column !important;
  }
  .atplay-cal .ap-gutter-corner {
    border-bottom: 1px solid #e0e0e0 !important;
    height: 46px !important;
  }
  .atplay-cal .ap-time-gutter {
    position: relative !important;
  }
  .atplay-cal .ap-time-label {
    position: absolute !important;
    right: 6px !important;
    font-size: 10px !important;
    font-weight: 600 !important;
    color: #aaa !important;
    line-height: 1 !important;
    transform: translateY(-50%) !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    white-space: nowrap !important;
    text-transform: none !important;
    letter-spacing: normal !important;
  }

  /* Day columns */
  .atplay-cal .ap-day-col {
    background: #fff !important;
    display: flex !important;
    flex-direction: column !important;
    min-width: 0 !important;
    border-left: 1px solid #e8e8e8 !important;
  }
  .atplay-cal .ap-day-col:last-child {
    border-right: 1px solid #e8e8e8 !important;
  }
  .atplay-cal .ap-day-hdr {
    padding: 10px 4px 6px 4px !important;
    border-bottom: 1px solid #e0e0e0 !important;
    text-align: center !important;
    background: #fff !important;
    height: 46px !important;
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
    overflow: hidden !important;
  }
  .atplay-cal .ap-day-name {
    font-size: 10px !important;
    font-weight: 700 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.8px !important;
    color: #999 !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    line-height: .8 !important;
  }
  .atplay-cal .ap-day-num {
    font-size: 14px !important;
    font-weight: 700 !important;
    color: #333 !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    line-height: 1 !important;
    margin-top: 1.5px !important;
    width: 24px !important;
    height: 24px !important;
    min-width: 24px !important;
    max-width: 24px !important;
    min-height: 24px !important;
    max-height: 24px !important;
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    border-radius: 50% !important;
    padding: 0 !important;
    flex-shrink: 0 !important;
  }
  .atplay-cal .ap-day-col.is-today .ap-day-num {
    background: var(--ap-color-3) !important;
    color: #fff !important;
    margin-top: 3px !important;
  }

  /* Day body — hour lines skip the first (8 AM) line */
  .atplay-cal .ap-day-body {
    position: relative !important;
    background-color: #fff !important;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent calc(var(--ap-hour-h) - 1px),
      #eee calc(var(--ap-hour-h) - 1px), #eee var(--ap-hour-h)
    ) !important;
    background-size: 100% var(--ap-hour-h) !important;
    overflow: visible !important;
  }

  /* Event cards */
  .atplay-cal .ap-card {
    position: absolute !important;
    z-index: 2 !important;
    border-radius: 5px !important;
    padding: 0 !important;
    cursor: pointer !important;
    transition: box-shadow 0.12s, background 0.12s !important;
    border: none !important;
    text-decoration: none !important;
    text-align: left !important;
    overflow: hidden !important;
  }
  .atplay-cal .ap-card:hover {
    box-shadow: 0 3px 12px rgba(0,0,0,0.18) !important;
    z-index: 3 !important;
    overflow: visible !important;
  }
  .atplay-cal .ap-startline {
    height: 4px !important;
    margin: 0 !important;
    border-radius: 5px 5px 0 0 !important;
  }
  .atplay-cal .ap-card-inner {
    padding: 4px 2px 6px 6px !important;
    display: flex !important;
    align-items: flex-start !important;
    gap: 5px !important;
    position: relative !important;
  }
  .atplay-cal .ap-icon {
    display: none !important;
  }
  .atplay-cal .ap-icon svg {
    width: 22px !important;
    height: 22px !important;
    display: block !important;
  }
  .atplay-cal .ap-info {
    flex: 1 !important;
    min-width: 0 !important;
  }
  .atplay-cal .ap-ev-name {
    font-size: 11px !important;
    font-weight: 700 !important;
    line-height: 1.2 !important;
    color: #333 !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    text-transform: none !important;
    text-decoration: none !important;
    white-space: normal !important;
    overflow-wrap: break-word !important;
    word-wrap: break-word !important;
  }
  .atplay-cal .ap-ev-time {
    font-size: 10px !important;
    color: #777 !important;
    margin-top: 1px !important;
    font-weight: 400 !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    text-transform: none !important;
    line-height: 1.2 !important;
  }

  /* ---- Modal ---- */
  .atplay-cal .ap-overlay {
    position: fixed !important;
    inset: 0 !important;
    background: rgba(0,0,0,0.45) !important;
    z-index: 99999 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    opacity: 0 !important;
    pointer-events: none !important;
    transition: opacity 0.2s !important;
  }
  .atplay-cal .ap-overlay.active {
    opacity: 1 !important;
    pointer-events: auto !important;
  }
  .atplay-cal .ap-modal {
    background: #fff !important;
    border-radius: 12px !important;
    width: 90% !important;
    max-width: 440px !important;
    max-height: 85vh !important;
    overflow-y: auto !important;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3) !important;
    transform: translateY(20px) !important;
    transition: transform 0.25s !important;
  }
  .atplay-cal .ap-overlay.active .ap-modal {
    transform: translateY(0) !important;
  }
  .atplay-cal .ap-modal-bar {
    height: 6px !important;
    border-radius: 12px 12px 0 0 !important;
  }
  .atplay-cal .ap-modal-body { padding: 24px !important; }
  .atplay-cal .ap-modal-hdr {
    display: flex !important;
    align-items: flex-start !important;
    gap: 14px !important;
    margin-bottom: 20px !important;
  }
  .atplay-cal .ap-modal-icon {
    flex-shrink: 0 !important;
    width: 44px !important;
    height: 44px !important;
  }
  .atplay-cal .ap-modal-icon svg { width: 44px !important; height: 44px !important; display: block !important; }
  .atplay-cal .ap-modal-title {
    font-size: 20px !important;
    font-weight: 700 !important;
    color: #222 !important;
    line-height: 1.3 !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    text-transform: none !important;
    letter-spacing: normal !important;
    margin: 0 !important;
    border: none !important;
  }
  .atplay-cal .ap-detail {
    display: flex !important;
    align-items: flex-start !important;
    gap: 12px !important;
    padding: 10px 0 !important;
    border-top: 1px solid #f0f0f0 !important;
    font-size: 14px !important;
    color: #555 !important;
  }
  .atplay-cal .ap-detail-lbl {
    font-weight: 600 !important;
    color: #888 !important;
    min-width: 80px !important;
    font-size: 12px !important;
    text-transform: uppercase !important;
    letter-spacing: 0.5px !important;
    padding-top: 2px !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
  }
  .atplay-cal .ap-detail-val {
    line-height: 1.5 !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    color: #555 !important;
    font-size: 14px !important;
  }
  .atplay-cal .ap-detail-val a { color: var(--ap-color-2) !important; text-decoration: none !important; }
  .atplay-cal .ap-detail-val a:hover { text-decoration: underline !important; }
  .atplay-cal .ap-modal-close {
    display: block !important;
    width: 100% !important;
    margin-top: 20px !important;
    padding: 10px !important;
    background: #f5f5f5 !important;
    border: none !important;
    border-radius: 8px !important;
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;
    font-size: 14px !important;
    font-weight: 600 !important;
    color: #666 !important;
    cursor: pointer !important;
    text-transform: none !important;
    letter-spacing: normal !important;
    text-decoration: none !important;
    line-height: 1.4 !important;
    text-align: center !important;
  }
  .atplay-cal .ap-modal-close:hover { background: #eee !important; }

  /* ---- Mobile ---- */
  @media (max-width: 768px) {

      background: transparent !important;

    .atplay-cal:not(.ap-3day) .ap-time-col { display: none !important; }
    .atplay-cal:not(.ap-3day) .ap-day-col {

      text-align: left !important;

      border-bottom: none !important;
      height: auto !important;

    .atplay-cal:not(.ap-3day) .ap-day-name { font-size: 13px !important; }
    .atplay-cal:not(.ap-3day) .ap-day-num {

      height: auto !important;

      background: var(--ap-color-3) !important;
      color: #fff !important;
      width: 26px !important;
      height: 26px !important;
      display: inline-flex !important;
      border-radius: 50% !important;

    .atplay-cal:not(.ap-3day) .ap-day-body {
      height: auto !important;
      position: static !important;
      background-image: none !important;

      flex-direction: column !important;
      gap: 6px !important;
      min-height: 70px !important;

    .atplay-cal:not(.ap-3day) .ap-card {
      position: static !important;
      left: auto !important;
      right: auto !important;
      width: auto !important;
      height: auto !important;
    }
    .atplay-cal:not(.ap-3day) .ap-no-events {
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      font-size: 11px !important;
      color: #bbb !important;
      font-weight: 600 !important;
      letter-spacing: 1px !important;
      flex: 1 !important;
      font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif !important;

    .atplay-cal:not(.ap-3day) .ap-card-inner { padding: 8px 10px !important; gap: 8px !important; }
    .atplay-cal:not(.ap-3day) .ap-icon { width: 32px !important; height: 32px !important; }

    .atplay-cal:not(.ap-3day) .ap-ev-time { font-size: 12px !important; }

      width: 100% !important;
      max-width: 100% !important;
      max-height: 100vh !important;
      border-radius: 0 !important;
      min-height: 100vh !important;

    .atplay-cal.ap-3day .ap-timetable {
      grid-template-columns: 52px repeat(3, 1fr) !important;
    }
  }
  #ap-loader, #ap-loader2 {
    position: absolute !important;
    inset: 0 !important;
    z-index: 99998 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    pointer-events: none !important;
  }
  #ap-loader .ap-loading-wrap, #ap-loader2 .ap-loading-wrap {
    width: 120px !important;
    height: 120px !important;
    background: #fff !important;
    border-radius: 50% !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    border: none !important;
  }
  #ap-loader .ap-loading-wrap img, #ap-loader2 .ap-loading-wrap img {
    width: 94px !important;
    height: 94px !important;
    animation: ap-spin 1.8s linear infinite !important;
  }
  .ap-scroll-area {
    height: 600px !important;
    overflow: auto !important;
  }
  .ap-page-wrap::after {
    content: '' !important;
    position: absolute !important;
    bottom: 0 !important;
    left: 0 !important;
    right: 0 !important;
    height: 1px !important;
    background: #e8e8e8 !important;
    z-index: 99997 !important;
    pointer-events: none !important;
  }
</style>
</head>

function getIconType(name) {
  var lower = name.toLowerCase();
  for (var i = 0; i < ICON_MAP.length; i++)
    for (var j = 0; j < ICON_MAP[i].keywords.length; j++)
      if (lower.indexOf(ICON_MAP[i].keywords[j]) !== -1) return ICON_MAP[i].icon;
  return 'default';
}

function stripEmojis(s) {
  s=s.replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE00}-\u{FE0F}\u{200D}\u{20E3}\u{E0020}-\u{E007F}]/gu, '');
  s=s.replace(/^[^\p{L}\p{N}]+/gu,'');
  return s.replace(/\s{2,}/g, ' ').trim();
}

function hexToRgba(hex,a) {
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

var colorAssignments = {}, nextColorIndex = 0, currentEvents = [];

function getColorForClass(name) {
  var key = name.trim().toLowerCase();
  if (colorAssignments[key] !== undefined) return colorAssignments[key];
  var max = PALETTE.length - 1;
  colorAssignments[key] = nextColorIndex % max;
  nextColorIndex++;
  if (nextColorIndex > max * 2 && Object.keys(colorAssignments).length > max) {
    var keys = Object.keys(colorAssignments);
    if (colorAssignments[keys[keys.length-1]] < max) colorAssignments[keys[keys.length-1]] = 3;
  }
  return colorAssignments[key];
}

var currentWeekStart = getWeekStart(new Date());
function getWeekStart(d) { var r = new Date(d); r.setDate(r.getDate()-r.getDay()); r.setHours(0,0,0,0); return r; }
function addDays(d,n) { var r = new Date(d); r.setDate(r.getDate()+n); return r; }
function formatDate(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function formatDateFull(d) { return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
function fmtTime(d,showPeriod) {
  var h=d.getHours(),m=d.getMinutes(),p=h>=12?'PM':'AM';
  h=h%12||12;
  var t=m===0?String(h):h+':'+String(m).padStart(2,'0');
  return showPeriod?t+' '+p:t;
}
function formatTime(s) { var d=new Date(s);return fmtTime(d,true); }
function formatTimeRange(a,b) { return fmtTime(new Date(a),false)+' – '+fmtTime(new Date(b),true); }
function isSameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function isToday(d) { return isSameDay(d,new Date()); }
function updateWeekLabel() {
  var end = addDays(currentWeekStart,6);
  document.getElementById('weekLabel').textContent = formatDate(currentWeekStart)+' – '+formatDate(end)+', '+end.getFullYear();
}
var allCachedEvents = null;
function navigateWeek(dir) {
  currentWeekStart=addDays(currentWeekStart,dir*7);
  updateWeekLabel();
  if(allCachedEvents) renderCalendar(filterWeekEvents(allCachedEvents,currentWeekStart));
}
function navigateToday() {
  currentWeekStart=getWeekStart(new Date());
  updateWeekLabel();
  if(allCachedEvents) renderCalendar(filterWeekEvents(allCachedEvents,currentWeekStart));
}

/* ---- iCal ---- */
function parseICalDate(s) {
  if (!s) return null; s=s.replace(/^.*:/,'');
  if (s.indexOf('T')!==-1) {
    var iso=s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8)+'T'+s.slice(9,11)+':'+s.slice(11,13)+':'+s.slice(13,15);
    return new Date(s.charAt(s.length-1)==='Z'?iso+'Z':iso);
  }
  return new Date(s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8)+'T00:00:00');
}
function parseICal(text) {
  var lines=[],raw=text.split(/\r?\n/);
  for (var i=0;i<raw.length;i++) {
    if ((raw[i].charAt(0)===' '||raw[i].charAt(0)==='\t')&&lines.length) lines[lines.length-1]+=raw[i].slice(1);
    else lines.push(raw[i]);
  }
  var events=[],inEv=false,ev={};
  for (var j=0;j<lines.length;j++) {
    var ln=lines[j];
    if (ln==='BEGIN:VEVENT'){inEv=true;ev={};continue;}
    if (ln==='END:VEVENT'){inEv=false;if(ev.dtstart)events.push(ev);continue;}
    if (!inEv) continue;
    var ci=ln.indexOf(':');if(ci<0)continue;
    var key=ln.slice(0,ci).split(';')[0].toUpperCase(),val=ln.slice(ci+1);
    var ue=function(v){return v.replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\\\/g,'\\');};
    if(key==='SUMMARY')ev.summary=ue(val);
    else if(key==='DTSTART')ev.dtstart=parseICalDate(val);
    else if(key==='DTEND')ev.dtend=parseICalDate(val);
    else if(key==='DESCRIPTION')ev.description=ue(val);
    else if(key==='LOCATION')ev.location=ue(val);
  }
  return events;
}
function normalizeAllEvents(ical) {
  return ical.filter(function(e){
    if(!e.dtstart)return false;
    var allDay=e.dtstart.getHours()===0&&e.dtstart.getMinutes()===0&&e.dtend&&e.dtend.getHours()===0&&e.dtend.getMinutes()===0&&(e.dtend-e.dtstart)>=86400000;
    if(allDay)return false;
    if(e.summary&&e.summary.toLowerCase().indexOf('open play')!==-1)return false;
    return true;
  }).sort(function(a,b){return a.dtstart-b.dtstart;}).map(function(e){
    return {summary:e.summary||'Untitled',start:{dateTime:e.dtstart.toISOString()},end:{dateTime:(e.dtend||new Date(e.dtstart.getTime()+3600000)).toISOString()},description:e.description||'',location:e.location||'',htmlLink:''};
  });
}
function filterWeekEvents(events, weekStart) {
  var weekEnd=addDays(weekStart,7);
  return events.filter(function(e){var d=new Date(e.start.dateTime);return d>=weekStart&&d<weekEnd;});
}

/* ---- Fetch ---- */
async function fetchViaICal() {
  var errors=[];
  for (var i=0;i<CORS_PROXIES.length;i++) {
    try {
      var res=await fetch(CORS_PROXIES[i](ICAL_URL));
      if(!res.ok)throw new Error('HTTP '+res.status);
      var text=await res.text();
      if(text.indexOf('BEGIN:VCALENDAR')===-1)throw new Error('Not iCal');
      return normalizeAllEvents(parseICal(text));
    } catch(e){errors.push('Proxy '+(i+1)+': '+e.message);}
  }
  throw new Error(errors.join(' | '));
}
async function fetchViaGoogleEmbed() {
  var calId=encodeURIComponent(CONFIG.CALENDAR_ID);
  var rangeStart=addDays(new Date(),-90),rangeEnd=addDays(new Date(),90);
  var url='https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events?key=AIzaSyBNlYH01_9Hc5S1J9vuFmu2nUqBZJNAXxs&timeMin='+rangeStart.toISOString()+'&timeMax='+rangeEnd.toISOString()+'&singleEvents=true&orderBy=startTime&timeZone='+CONFIG.TIMEZONE+'&maxResults=2500';
  var res=await fetch(url);if(!res.ok)throw new Error('Embed API '+res.status);
  var data=await res.json();return(data.items||[]).filter(function(e){return e.start&&e.start.dateTime&&!(e.summary&&e.summary.toLowerCase().indexOf('open play')!==-1);});
}
async function fetchViaAPI() {
  if(!CONFIG.API_KEY)throw new Error('No API key');
  var calId=encodeURIComponent(CONFIG.CALENDAR_ID);
  var rangeStart=addDays(new Date(),-90),rangeEnd=addDays(new Date(),90);
  var url='https://www.googleapis.com/calendar/v3/calendars/'+calId+'/events?key='+CONFIG.API_KEY+'&timeMin='+rangeStart.toISOString()+'&timeMax='+rangeEnd.toISOString()+'&singleEvents=true&orderBy=startTime&timeZone='+CONFIG.TIMEZONE+'&maxResults=2500';
  var res=await fetch(url);if(!res.ok)throw new Error('API '+res.status);
  var data=await res.json();return(data.items||[]).filter(function(e){return e.start&&e.start.dateTime&&!(e.summary&&e.summary.toLowerCase().indexOf('open play')!==-1);});
}
async function fetchEvents() {
  var errors=[];
  if(CONFIG.API_KEY){try{return await fetchViaAPI();}catch(e){errors.push('API: '+e.message);}}
  try{return await fetchViaICal();}catch(e){errors.push('iCal: '+e.message);}
  try{return await fetchViaGoogleEmbed();}catch(e){errors.push('Embed: '+e.message);}
  throw new Error(errors.join(' | '));
}

/* ---- Render ---- */
function groupByDay(events) {
  var days=[];
  for(var i=0;i<7;i++)days.push({date:addDays(currentWeekStart,i),events:[]});
  for(var j=0;j<events.length;j++){var d=new Date(events[j].start.dateTime);for(var k=0;k<days.length;k++){if(isSameDay(d,days[k].date)){days[k].events.push(events[j]);break;}}}
  return days;
}
function hourLabel(h) {
  if(h===0)return '12 AM';if(h<12)return h+' AM';if(h===12)return '12 PM';return(h-12)+' PM';
}

var MIN_VISUAL_MINUTES = 50;
function computeOverlapLayout(dayEvents) {
  var result={};
  for(var i=0;i<dayEvents.length;i++) result[i]={col:0,totalCols:1};
  if(dayEvents.length<=1) return result;
  function visualEnd(ev){
    var s=new Date(ev.start.dateTime),e=new Date(ev.end.dateTime);
    var minE=new Date(s.getTime()+MIN_VISUAL_MINUTES*60000);
    return e>minE?e:minE;
  }
  function overlaps(a,b){
    return new Date(dayEvents[a].start.dateTime)<visualEnd(dayEvents[b])
        && new Date(dayEvents[b].start.dateTime)<visualEnd(dayEvents[a]);
  }
  var visited={},groups=[];
  for(var i=0;i<dayEvents.length;i++){
    if(visited[i])continue;
    var group=[i];visited[i]=true;var q=0;
    while(q<group.length){
      for(var j=0;j<dayEvents.length;j++){
        if(!visited[j]&&overlaps(group[q],j)){visited[j]=true;group.push(j);}
      }
      q++;
    }
    groups.push(group);
  }
  for(var g=0;g<groups.length;g++){
    var grp=groups[g];
    if(grp.length===1)continue;
    grp.sort(function(a,b){return new Date(dayEvents[a].start.dateTime)-new Date(dayEvents[b].start.dateTime);});
    var cols=[];
    for(var i=0;i<grp.length;i++){
      var idx=grp[i],evStart=new Date(dayEvents[idx].start.dateTime);
      var vEnd=visualEnd(dayEvents[idx]);
      var placed=false;
      for(var c=0;c<cols.length;c++){
        if(evStart>=cols[c]){cols[c]=vEnd;result[idx].col=c;placed=true;break;}
      }
      if(!placed){cols.push(vEnd);result[idx].col=cols.length-1;}
    }
    for(var i=0;i<grp.length;i++) result[grp[i]].totalCols=cols.length;
  }
  return result;
}

function renderCalendar(events) {
  currentEvents=events;
  var root=document.getElementById('calendarRoot');
  var days=groupByDay(events);
  var isMobile=window.innerWidth<=CONFIG.MOBILE_BREAKPOINT;
  var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var H=CONFIG.HOUR_HEIGHT;
  var totalH=(CONFIG.END_HOUR-CONFIG.START_HOUR)*H;
  var html='<div class="ap-timetable">';

  html+='<div class="ap-time-col"><div class="ap-gutter-corner"></div>';
  html+='<div class="ap-time-gutter" style="height:'+totalH+'px">';
  for(var h=CONFIG.START_HOUR;h<=CONFIG.END_HOUR;h++){
    if(h===CONFIG.START_HOUR||h===CONFIG.END_HOUR)continue;
    html+='<div class="ap-time-label" style="top:'+((h-CONFIG.START_HOUR)*H)+'px">'+hourLabel(h)+'</div>';
  }
  html+='</div></div>';

  for(var i=0;i<days.length;i++){
    var day=days[i],today=isToday(day.date),hasEvents=day.events.length>0;
    var cls='ap-day-col'+(today?' is-today':'');
    html+='<div class="'+cls+'">';
    html+='<div class="ap-day-hdr"><div class="ap-day-name">'+dayNames[day.date.getDay()]+'</div>';
    html+='<div class="ap-day-num">'+day.date.getDate()+'</div></div>';
    html+='<div class="ap-day-body" style="height:'+totalH+'px">';

    var layout=computeOverlapLayout(day.events);
    for(var j=0;j<day.events.length;j++){
      var ev=day.events[j],gi=events.indexOf(ev);
      var name=stripEmojis(ev.summary||'')||'Untitled';
      var ci=getColorForClass(name);
      var pal=PALETTE[ci];
      var icon=getSvgIcon(getIconType(name),pal.color);
      var st=new Date(ev.start.dateTime);
      var et=new Date(ev.end.dateTime);
      var startHrs=st.getHours()+st.getMinutes()/60;
      var endHrs=et.getHours()+et.getMinutes()/60;
      var topPx=Math.max(0,(startHrs-CONFIG.START_HOUR)*H);
      var heightPx=Math.max(30,(endHrs-startHrs)*H);
      var lo=layout[j];
      var colPct=(lo.col/lo.totalCols*100);
      var widthPct=(100/lo.totalCols);
      var bgColor=hexToRgba(pal.color,0.2);
      var posStyle='top:'+topPx+'px;height:'+heightPx+'px;left:calc('+colPct+'% + 2px);width:calc('+widthPct+'% - 4px);background:linear-gradient('+bgColor+','+bgColor+'),#fff';

      html+='<div class="ap-card" data-idx="'+gi+'" style="'+posStyle+'">';
      html+='<div class="ap-startline" style="background:'+pal.color+'"></div>';
      if(lo.totalCols>1){
        html+='<div class="ap-card-inner"><div class="ap-info"><div class="ap-ev-name">'+escapeHtml(name)+'</div>';
        html+='<div class="ap-ev-time">'+formatTimeRange(ev.start.dateTime,ev.end.dateTime)+'</div>';
        html+='</div></div></div>';
      } else {
        html+='<div class="ap-card-inner"><div class="ap-icon">'+icon+'</div>';
        html+='<div class="ap-info"><div class="ap-ev-name">'+escapeHtml(name)+'</div>';
        html+='<div class="ap-ev-time">'+formatTimeRange(ev.start.dateTime,ev.end.dateTime)+'</div>';
        html+='</div></div></div>';
      }
    }
    html+='</div></div>';

/* ---- Modal ---- */
function showModal(idx) {
  var ev=currentEvents[idx];if(!ev)return;
  var name=stripEmojis(ev.summary||'')||'Untitled';
  var ci=getColorForClass(name),pal=PALETTE[ci];
  var icon=getSvgIcon(getIconType(name),pal.color);
  var sd=new Date(ev.start.dateTime);
  var h='<div class="ap-modal-bar" style="background:'+pal.color+'"></div><div class="ap-modal-body">';
  h+='<div class="ap-modal-hdr"><div class="ap-modal-icon">'+icon+'</div>';
  h+='<div class="ap-modal-title">'+escapeHtml(name)+'</div></div>';
  h+='<div class="ap-detail"><span class="ap-detail-lbl">Date</span><span class="ap-detail-val">'+formatDateFull(sd)+'</span></div>';
  h+='<div class="ap-detail"><span class="ap-detail-lbl">Time</span><span class="ap-detail-val">'+formatTimeRange(ev.start.dateTime,ev.end.dateTime)+'</span></div>';
  if(ev.location)h+='<div class="ap-detail"><span class="ap-detail-lbl">Location</span><span class="ap-detail-val">'+escapeHtml(ev.location)+'</span></div>';
  if(ev.description)h+='<div class="ap-detail"><span class="ap-detail-lbl">Details</span><span class="ap-detail-val">'+sanitizeDescription(ev.description)+'</span></div>';
  if(ev.htmlLink)h+='<div class="ap-detail"><span class="ap-detail-lbl">Link</span><span class="ap-detail-val"><a href="'+escapeHtml(ev.htmlLink)+'" target="_blank" rel="noopener">View in Google Calendar</a></span></div>';
  h+='<button class="ap-modal-close" onclick="closeModal()">Close</button></div>';
  document.getElementById('modalContent').innerHTML=h;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeModal(e) {
  if(e&&e.target!==document.getElementById('modalOverlay'))return;
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow='';
}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeModal2();}});
document.getElementById('calendarRoot').addEventListener('click',function(e){
  var card=e.target.closest('.ap-card');
  if(card){var idx=parseInt(card.dataset.idx,10);if(!isNaN(idx))showModal(idx);}
});

function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function sanitizeDescription(h){var t=document.createElement('div');t.innerHTML=h;var b=t.querySelectorAll('script,style,iframe,object,embed');for(var i=0;i<b.length;i++)b[i].remove();return t.innerHTML;}

/* ---- Calendar 2 (3-day mobile) ---- */
var currentWeekStart2 = getWeekStart(new Date());
var currentDayStart2 = (function(){ var d = new Date(); d.setHours(0,0,0,0); return d; })();
var currentEvents2 = [];

function isMobile2() { return window.innerWidth <= CONFIG.MOBILE_BREAKPOINT; }

function updateWeekLabel2() {
  var mob = isMobile2();
  var start = mob ? currentDayStart2 : currentWeekStart2;
  var end = addDays(start, mob ? 2 : 6);
  document.getElementById('weekLabel2').textContent = formatDate(start) + ' – ' + formatDate(end) + ', ' + end.getFullYear();
}

function filterEvents2(events) {
  if (isMobile2()) {
    var end = addDays(currentDayStart2, 3);
    return events.filter(function(e) { var d = new Date(e.start.dateTime); return d >= currentDayStart2 && d < end; });
  }
  return filterWeekEvents(events, currentWeekStart2);
}

function navigateWeek2(dir) {
  if (isMobile2()) currentDayStart2 = addDays(currentDayStart2, dir * 3);
  else currentWeekStart2 = addDays(currentWeekStart2, dir * 7);
  updateWeekLabel2();
  if (allCachedEvents) renderCalendar2(filterEvents2(allCachedEvents));
}

function navigateToday2() {
  currentWeekStart2 = getWeekStart(new Date());
  currentDayStart2 = (function(){ var d = new Date(); d.setHours(0,0,0,0); return d; })();
  updateWeekLabel2();
  if (allCachedEvents) renderCalendar2(filterEvents2(allCachedEvents));
}

function groupByDay2(events) {
  var mob = isMobile2(), numDays = mob ? 3 : 7;
  var start = mob ? currentDayStart2 : currentWeekStart2;
  var days = [];
  for (var i = 0; i < numDays; i++) days.push({ date: addDays(start, i), events: [] });
  for (var j = 0; j < events.length; j++) {
    var d = new Date(events[j].start.dateTime);
    for (var k = 0; k < days.length; k++) if (isSameDay(d, days[k].date)) { days[k].events.push(events[j]); break; }
  }
  return days;
}

function renderCalendar2(events) {
  currentEvents2 = events;
  var root = document.getElementById('calendarRoot2');
  var days = groupByDay2(events);
  var numDays = days.length;
  var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var H = CONFIG.HOUR_HEIGHT, totalH = (CONFIG.END_HOUR - CONFIG.START_HOUR) * H;
  var html = '<div class="ap-timetable" style="grid-template-columns: 52px repeat(' + numDays + ', 1fr) !important">';
  html += '<div class="ap-time-col"><div class="ap-gutter-corner"></div>';
  html += '<div class="ap-time-gutter" style="height:' + totalH + 'px">';
  for (var h = CONFIG.START_HOUR; h <= CONFIG.END_HOUR; h++) {
    if (h === CONFIG.START_HOUR || h === CONFIG.END_HOUR) continue;
    html += '<div class="ap-time-label" style="top:' + ((h - CONFIG.START_HOUR) * H) + 'px">' + hourLabel(h) + '</div>';
  }
  html += '</div></div>';
  for (var i = 0; i < days.length; i++) {
    var day = days[i], today = isToday(day.date);
    html += '<div class="ap-day-col' + (today ? ' is-today' : '') + '">';
    html += '<div class="ap-day-hdr"><div class="ap-day-name">' + dayNames[day.date.getDay()] + '</div>';
    html += '<div class="ap-day-num">' + day.date.getDate() + '</div></div>';
    html += '<div class="ap-day-body" style="height:' + totalH + 'px">';
    var layout = computeOverlapLayout(day.events);
    for (var j = 0; j < day.events.length; j++) {
      var ev = day.events[j], gi = events.indexOf(ev);
      var name = stripEmojis(ev.summary || '') || 'Untitled';
      var ci = getColorForClass(name), pal = PALETTE[ci];
      var icon = getSvgIcon(getIconType(name), pal.color);
      var st = new Date(ev.start.dateTime), et = new Date(ev.end.dateTime);
      var topPx = Math.max(0, (st.getHours() + st.getMinutes() / 60 - CONFIG.START_HOUR) * H);
      var heightPx = Math.max(30, (et.getHours() + et.getMinutes() / 60 - st.getHours() - st.getMinutes() / 60) * H);
      var lo = layout[j], colPct = lo.col / lo.totalCols * 100, widthPct = 100 / lo.totalCols;
      var bgColor = hexToRgba(pal.color, 0.2);
      var posStyle = 'top:' + topPx + 'px;height:' + heightPx + 'px;left:calc(' + colPct + '% + 2px);width:calc(' + widthPct + '% - 4px);background:linear-gradient(' + bgColor + ',' + bgColor + '),#fff';
      html += '<div class="ap-card" data-idx2="' + gi + '" style="' + posStyle + '">';
      html += '<div class="ap-startline" style="background:' + pal.color + '"></div>';
      if (lo.totalCols > 1) {
        html += '<div class="ap-card-inner"><div class="ap-info"><div class="ap-ev-name">' + escapeHtml(name) + '</div>';
        html += '<div class="ap-ev-time">' + formatTimeRange(ev.start.dateTime, ev.end.dateTime) + '</div></div></div></div>';
      } else {
        html += '<div class="ap-card-inner"><div class="ap-icon">' + icon + '</div>';
        html += '<div class="ap-info"><div class="ap-ev-name">' + escapeHtml(name) + '</div>';
        html += '<div class="ap-ev-time">' + formatTimeRange(ev.start.dateTime, ev.end.dateTime) + '</div></div></div></div>';
      }
    }
    html += '</div></div>';
  }
  html += '</div>';
  root.innerHTML = html;
}

function showModal2(idx) {
  var ev = currentEvents2[idx]; if (!ev) return;
  var name = stripEmojis(ev.summary || '') || 'Untitled';
  var ci = getColorForClass(name), pal = PALETTE[ci];
  var icon = getSvgIcon(getIconType(name), pal.color);
  var sd = new Date(ev.start.dateTime);
  var h = '<div class="ap-modal-bar" style="background:' + pal.color + '"></div><div class="ap-modal-body">';
  h += '<div class="ap-modal-hdr"><div class="ap-modal-icon">' + icon + '</div>';
  h += '<div class="ap-modal-title">' + escapeHtml(name) + '</div></div>';
  h += '<div class="ap-detail"><span class="ap-detail-lbl">Date</span><span class="ap-detail-val">' + formatDateFull(sd) + '</span></div>';
  h += '<div class="ap-detail"><span class="ap-detail-lbl">Time</span><span class="ap-detail-val">' + formatTimeRange(ev.start.dateTime, ev.end.dateTime) + '</span></div>';
  if (ev.location) h += '<div class="ap-detail"><span class="ap-detail-lbl">Location</span><span class="ap-detail-val">' + escapeHtml(ev.location) + '</span></div>';
  if (ev.description) h += '<div class="ap-detail"><span class="ap-detail-lbl">Details</span><span class="ap-detail-val">' + sanitizeDescription(ev.description) + '</span></div>';
  if (ev.htmlLink) h += '<div class="ap-detail"><span class="ap-detail-lbl">Link</span><span class="ap-detail-val"><a href="' + escapeHtml(ev.htmlLink) + '" target="_blank" rel="noopener">View in Google Calendar</a></span></div>';
  h += '<button class="ap-modal-close" onclick="closeModal2()">Close</button></div>';
  document.getElementById('modalContent2').innerHTML = h;
  document.getElementById('modalOverlay2').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal2(e) {
  if (e && e.target !== document.getElementById('modalOverlay2')) return;
  document.getElementById('modalOverlay2').classList.remove('active');
  document.body.style.overflow = '';
}
document.getElementById('calendarRoot2').addEventListener('click', function(e) {
  var card = e.target.closest('.ap-card');
  if (card && card.dataset.idx2 !== undefined) { var idx = parseInt(card.dataset.idx2, 10); if (!isNaN(idx)) showModal2(idx); }
});

async function loadCalendar() {
  updateWeekLabel();
  updateWeekLabel2();
  showLoading();
  document.getElementById('ap-loader2').innerHTML = document.getElementById('ap-loader').innerHTML;
  renderCalendar([]);
  renderCalendar2([]);
  try {
    allCachedEvents = await fetchEvents();
    hideLoading();
    document.getElementById('ap-loader2').innerHTML = '';
    renderCalendar(filterWeekEvents(allCachedEvents, currentWeekStart));
    renderCalendar2(filterEvents2(allCachedEvents));
  } catch(err) {
    document.getElementById('statusBanner').innerHTML = '<div class="ap-setup-msg">'
      +'Could not load calendar data. The calendar owner needs to enable '
      +'"Make available to public" in the calendar\'s Access permissions, '
      +'or set a Google Calendar API key in <code>CONFIG.API_KEY</code>.'
      +'<br><small style="color:#aaa!important;margin-top:8px!important;display:block!important">'
      +escapeHtml(err.message)+'</small></div>';
    document.getElementById('statusBanner2').innerHTML = document.getElementById('statusBanner').innerHTML;
  }
}

var resizeTimer;
window.addEventListener('resize',function(){
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(function(){
    renderCalendar(currentEvents);
    if (allCachedEvents) { updateWeekLabel2(); renderCalendar2(filterEvents2(allCachedEvents)); }
  },200);
});

loadCalendar();
</script>
