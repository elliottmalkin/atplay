<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>At Play — Weekly Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-1: #E8943A;
    --color-2: #7BAED6;
    --color-3: #E84B8A;
    --color-4: #6BAE73;
    --bg-1: #FDF3E7;
    --bg-2: #EBF3FA;
    --bg-3: #FDEAF2;
    --bg-4: #EDF7EE;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Open Sans', 'Helvetica Neue', Helvetica, sans-serif;
    background: #fafafa;
    color: #333;
    min-height: 100vh;
  }

  .header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #222;
    letter-spacing: -0.3px;
  }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .week-nav button {
    background: #fff;
    border: 1px solid #d0d0d0;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .week-nav button:hover { background: #f0f0f0; border-color: #bbb; }
  .week-nav button.today-btn { color: var(--color-3); border-color: var(--color-3); }
  .week-nav button.today-btn:hover { background: var(--bg-3); }

  .week-label {
    font-size: 15px;
    font-weight: 600;
    color: #555;
    min-width: 200px;
    text-align: center;
  }

  .loading-state, .error-state {
    text-align: center;
    padding: 60px 24px;
    color: #888;
    font-size: 15px;
    line-height: 1.6;
  }
  .error-state { color: #c44; }
  .error-state code {
    display: block;
    margin-top: 12px;
    background: #f5f5f5;
    padding: 12px;
    border-radius: 6px;
    font-size: 13px;
    color: #666;
    word-break: break-all;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: #e0e0e0;
    margin: 0;
  }

  .day-column {
    background: #fff;
    min-height: 160px;
    display: flex;
    flex-direction: column;
  }

  .day-header {
    padding: 10px 10px 6px;
    border-bottom: 1px solid #eee;
    text-align: center;
  }
  .day-name {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #888;
  }
  .day-date {
    font-size: 20px;
    font-weight: 700;
    color: #333;
    margin-top: 2px;
  }
  .day-column.is-today .day-date {
    background: var(--color-3);
    color: #fff;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
  }

  .day-events {
    padding: 6px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .no-events {
    color: #ccc;
    font-size: 12px;
    text-align: center;
    padding: 20px 0;
  }

  .event-card {
    border-radius: 6px;
    padding: 8px 10px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
    position: relative;
  }
  .event-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
  }

  .event-start-line {
    height: 4px;
    border-radius: 2px;
    margin-bottom: 6px;
  }

  .event-content {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .event-icon {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
  }
  .event-icon svg {
    width: 28px;
    height: 28px;
  }

  .event-info {
    flex: 1;
    min-width: 0;
  }

  .event-name {
    font-size: 12px;
    font-weight: 700;
    line-height: 1.3;
    color: #333;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .event-time {
    font-size: 11px;
    color: #777;
    margin-top: 2px;
    font-weight: 400;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .modal-content {
    background: #fff;
    border-radius: 12px;
    width: 90%;
    max-width: 440px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    transform: translateY(20px);
    transition: transform 0.25s;
  }
  .modal-overlay.active .modal-content {
    transform: translateY(0);
  }

  .modal-color-bar {
    height: 6px;
    border-radius: 12px 12px 0 0;
  }

  .modal-body {
    padding: 24px;
  }

  .modal-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 20px;
  }

  .modal-icon {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
  }
  .modal-icon svg { width: 44px; height: 44px; }

  .modal-title {
    font-size: 20px;
    font-weight: 700;
    color: #222;
    line-height: 1.3;
  }

  .modal-detail-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-top: 1px solid #f0f0f0;
    font-size: 14px;
    color: #555;
  }
  .modal-detail-row .detail-label {
    font-weight: 600;
    color: #888;
    min-width: 80px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding-top: 2px;
  }
  .modal-detail-row .detail-value { line-height: 1.5; }
  .modal-detail-row .detail-value a {
    color: var(--color-2);
    text-decoration: none;
  }
  .modal-detail-row .detail-value a:hover { text-decoration: underline; }

  .modal-close {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    background: #f5f5f5;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    color: #666;
    cursor: pointer;
    transition: background 0.15s;
  }
  .modal-close:hover { background: #eee; }

  .legend {
    padding: 10px 24px;
    background: #fff;
    border-top: 1px solid #e0e0e0;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    font-size: 12px;
    color: #777;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  /* Mobile layout */
  @media (max-width: 768px) {
    .header {
      padding: 12px 16px;
      justify-content: center;
      text-align: center;
    }
    .header h1 { width: 100%; }

    .week-label { min-width: auto; font-size: 14px; }
    .week-nav button { padding: 6px 10px; font-size: 12px; }

    .calendar-grid {
      grid-template-columns: 1fr;
      gap: 0;
      background: transparent;
    }

    .day-column {
      border-bottom: 1px solid #e0e0e0;
      min-height: auto;
    }
    .day-column.mobile-hidden { display: none; }

    .day-header {
      text-align: left;
      padding: 14px 16px 8px;
      display: flex;
      align-items: baseline;
      gap: 8px;
      border-bottom: none;
    }
    .day-name { font-size: 13px; }
    .day-date { font-size: 16px; }

    .day-events { padding: 4px 12px 14px; }

    .event-card { padding: 10px 12px; }
    .event-name { font-size: 14px; }
    .event-time { font-size: 12px; }
    .event-icon { width: 32px; height: 32px; }
    .event-icon svg { width: 32px; height: 32px; }

    .modal-content {
      width: 100%;
      max-width: 100%;
      max-height: 100vh;
      border-radius: 0;
      min-height: 100vh;
    }
    .modal-body { padding: 20px 16px; }

    .legend { padding: 10px 16px; justify-content: center; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>At Play</h1>
  <div class="week-nav">
    <button onclick="navigateWeek(-1)" aria-label="Previous week">&larr; Prev</button>
    <button class="today-btn" onclick="navigateToday()">Today</button>
    <button onclick="navigateWeek(1)" aria-label="Next week">Next &rarr;</button>
  </div>
  <div class="week-label" id="weekLabel"></div>
</div>

<div id="calendarRoot">
  <div class="loading-state" id="loadingState">Loading schedule&hellip;</div>
</div>

<div class="legend" id="legend"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-content" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

    const keys = Object.keys(colorAssignments);
    const lastKey = keys[keys.length - 1];
    if (colorAssignments[lastKey] < maxColors) {
      colorAssignments[lastKey] = 3;
    }
  }
  return colorAssignments[key];
}

let currentWeekStart = getWeekStart(new Date());

function getWeekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() - day);
  d.setHours(0, 0, 0, 0);
  return d;
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function formatDate(date) {
  return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDateFull(date) {
  return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function formatTime(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: CONFIG.TIMEZONE });
}

function formatTimeRange(start, end) {
  return `${formatTime(start)} – ${formatTime(end)}`;
}

function isSameDay(d1, d2) {
  return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
}

function isToday(date) {
  return isSameDay(date, new Date());
}

function updateWeekLabel() {
  const end = addDays(currentWeekStart, 6);
  document.getElementById('weekLabel').textContent =
    `${formatDate(currentWeekStart)} – ${formatDate(end)}, ${end.getFullYear()}`;
}

function navigateWeek(dir) {
  currentWeekStart = addDays(currentWeekStart, dir * 7);
  loadCalendar();
}

function navigateToday() {
  currentWeekStart = getWeekStart(new Date());
  loadCalendar();
}

async function fetchEvents() {
  const timeMin = currentWeekStart.toISOString();
  const timeMax = addDays(currentWeekStart, 7).toISOString();
  const calId = encodeURIComponent(CONFIG.CALENDAR_ID);
  const url = `https://www.googleapis.com/calendar/v3/calendars/${calId}/events?`
    + `key=${CONFIG.API_KEY}`
    + `&timeMin=${timeMin}`
    + `&timeMax=${timeMax}`
    + `&singleEvents=true`
    + `&orderBy=startTime`
    + `&timeZone=${CONFIG.TIMEZONE}`
    + `&maxResults=250`;

  const res = await fetch(url);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return (data.items || []).filter(e => e.start?.dateTime);
}

function groupByDay(events) {
  const days = [];
  for (let i = 0; i < 7; i++) {
    const date = addDays(currentWeekStart, i);
    days.push({ date, events: [] });
  }
  for (const ev of events) {
    const evDate = new Date(ev.start.dateTime);
    for (const day of days) {
      if (isSameDay(evDate, day.date)) {
        day.events.push(ev);
        break;
      }
    }
  }
  return days;
}

function renderCalendar(events) {
  currentEvents = events;
  const root = document.getElementById('calendarRoot');
  const days = groupByDay(events);
  const isMobile = window.innerWidth <= CONFIG.MOBILE_BREAKPOINT;

  let html = '<div class="calendar-grid">';
  let eventIdx = 0;

  for (const day of days) {
    const today = isToday(day.date);
    const hasEvents = day.events.length > 0;
    const hiddenClass = isMobile && !hasEvents ? 'mobile-hidden' : '';
    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    html += `<div class="day-column ${today ? 'is-today' : ''} ${hiddenClass}">`;
    html += `<div class="day-header">`;
    html += `<div class="day-name">${dayNames[day.date.getDay()]}</div>`;
    html += `<div class="day-date">${day.date.getDate()}</div>`;
    html += `</div>`;
    html += `<div class="day-events">`;

    if (day.events.length === 0) {
      html += '<div class="no-events">&mdash;</div>';
    } else {
      for (const ev of day.events) {
        const globalIdx = events.indexOf(ev);
        const ci = getColorForClass(ev.summary || 'Event');
        const pal = PALETTE[ci];
        const iconType = getIconType(ev.summary || '');
        const icon = getSvgIcon(iconType, pal.color);

        html += `<div class="event-card" data-event-idx="${globalIdx}" style="background:${pal.bg}">`;
        html += `<div class="event-start-line" style="background:${pal.color}"></div>`;
        html += `<div class="event-content">`;
        html += `<div class="event-icon">${icon}</div>`;
        html += `<div class="event-info">`;
        html += `<div class="event-name">${escapeHtml(ev.summary || 'Untitled')}</div>`;
        html += `<div class="event-time">${formatTimeRange(ev.start.dateTime, ev.end.dateTime)}</div>`;
        html += `</div></div></div>`;
      }
    }
    html += '</div></div>';
  }

  html += '</div>';
  root.innerHTML = html;
  renderLegend();
}

function renderLegend() {
  const legend = document.getElementById('legend');
  const entries = Object.entries(colorAssignments).sort((a, b) => a[1] - b[1]);
  if (entries.length === 0) { legend.innerHTML = ''; return; }

  let html = '';
  for (const [name, ci] of entries) {
    const pal = PALETTE[ci];
    const display = name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
    html += `<div class="legend-item"><span class="legend-dot" style="background:${pal.color}"></span>${display}</div>`;
  }
  legend.innerHTML = html;
}

function showModal(idx) {
  const ev = currentEvents[idx];
  if (!ev) return;
  const ci = getColorForClass(ev.summary || 'Event');
  const pal = PALETTE[ci];
  const iconType = getIconType(ev.summary || '');
  const icon = getSvgIcon(iconType, pal.color);
  const startDate = new Date(ev.start.dateTime);

  let html = `<div class="modal-color-bar" style="background:${pal.color}"></div>`;
  html += '<div class="modal-body">';
  html += '<div class="modal-header">';
  html += `<div class="modal-icon">${icon}</div>`;
  html += `<div class="modal-title">${escapeHtml(ev.summary || 'Untitled')}</div>`;
  html += '</div>';

  html += '<div class="modal-detail-row"><span class="detail-label">Date</span>';
  html += `<span class="detail-value">${formatDateFull(startDate)}</span></div>`;

  html += '<div class="modal-detail-row"><span class="detail-label">Time</span>';
  html += `<span class="detail-value">${formatTimeRange(ev.start.dateTime, ev.end.dateTime)}</span></div>`;

  if (ev.location) {
    html += '<div class="modal-detail-row"><span class="detail-label">Location</span>';
    html += `<span class="detail-value">${escapeHtml(ev.location)}</span></div>`;
  }

  if (ev.description) {
    html += '<div class="modal-detail-row"><span class="detail-label">Details</span>';
    html += `<span class="detail-value">${sanitizeDescription(ev.description)}</span></div>`;
  }

  if (ev.htmlLink) {
    html += '<div class="modal-detail-row"><span class="detail-label">Link</span>';
    html += `<span class="detail-value"><a href="${escapeHtml(ev.htmlLink)}" target="_blank" rel="noopener">View in Google Calendar</a></span></div>`;
  }

  html += '<button class="modal-close" onclick="closeModal()">Close</button>';
  html += '</div>';

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

document.getElementById('calendarRoot').addEventListener('click', (e) => {
  const card = e.target.closest('.event-card');
  if (!card) return;
  const idx = parseInt(card.dataset.eventIdx, 10);
  if (!isNaN(idx)) showModal(idx);
});

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function sanitizeDescription(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.querySelectorAll('script,style,iframe,object,embed').forEach(el => el.remove());
  return tmp.innerHTML;
}

async function loadCalendar() {
  updateWeekLabel();
  const root = document.getElementById('calendarRoot');
  root.innerHTML = '<div class="loading-state">Loading schedule&hellip;</div>';

  try {
    const events = await fetchEvents();
    renderCalendar(events);
  } catch (err) {
    root.innerHTML = `<div class="error-state">
      <p>Could not load calendar data.</p>
      <p>If you're hosting this page, you may need to set your own Google Calendar API key in the <code>CONFIG.API_KEY</code> variable.</p>
      <code>${escapeHtml(err.message)}</code>
    </div>`;
  }
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (currentEvents.length > 0) renderCalendar(currentEvents);
  }, 200);
});

loadCalendar();
</script>
</body>
</html>
